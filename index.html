<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackbird OS</title>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>

  <!-- Part 2: top bar with OS name + live clock, plus app launchers -->
  <div id="top">
    <span class="brand">Blackbird OS</span>
    <div class="menu">
      <span id="welcomeopen">Welcome</span>
      <span id="notesopen">Notes</span>
      <span id="projectsopen">Projects</span>
      <span id="timeElement">Time</span>
    </div>
  </div>

  <!-- Part 4: desktop app icons (wired up in script.js via initializeIcon) -->
  <div id="desktopApps">
    <div class="appicon" id="welcomeicon">
      <div class="glyph"><img src="blackbird.webp" alt="Blackbird"></div>
      <p>Welcome</p>
    </div>
    <div class="appicon" id="notesicon">
      <div class="glyph"><img src="notes.jpg" alt="Notes"></div>
      <p>Notes</p>
    </div>
    <div class="appicon" id="projectsicon">
      <div class="glyph">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="13" height="13" rx="3" fill="#fff"/>
          <rect x="19" y="2" width="13" height="13" rx="3" fill="#fff" opacity="0.7"/>
          <rect x="2" y="19" width="13" height="13" rx="3" fill="#fff" opacity="0.7"/>
          <rect x="19" y="19" width="13" height="13" rx="3" fill="#fff"/>
        </svg>
      </div>
      <p>Projects</p>
    </div>
  </div>

  <!-- Part 3: welcome window, draggable + closable -->
  <div class="window" id="welcome" style="top: calc(50% - 200px); left: calc(50% - 190px);">
    <div class="windowheader" id="welcomeheader">
      <div class="closebutton" id="welcomeclose"></div>
      <p class="headertext">Welcome</p>
      <div class="spacer"></div>
    </div>
    <div class="welcomebody">
      <div id="clock">--:--</div>
      <div id="date">Welcome</div>

      <div class="avatar"><img src="blackbird.webp" alt="Blackbird"></div>
      <div class="name">Blackbird</div>

      <p class="tagline">
        Welcome to my WebOS. I like building things, games, learning, and coffee.
        Double-click an icon to open an app, and drag windows by their header.
      </p>

      <p class="links">
        <a href="https://github.com/flyingchickensaucer" target="_blank">GitHub</a>
      </p>
    </div>
  </div>

  <!-- Part 4: first app — a personalized Notes app with sidebar + content -->
  <div class="window" id="notes" style="top: calc(50% - 230px); left: calc(50% - 100px); display: none;">
    <div class="windowheader" id="notesheader">
      <div class="closebutton" id="notesclose"></div>
      <p class="headertext">Notes</p>
      <div class="spacer"></div>
    </div>
    <div class="appbody">
      <div id="sidebar"></div>
      <div id="notecontent"></div>
    </div>
  </div>

  <!-- Part 5: advanced app — Projects browser with category filters + detail view -->
  <div class="window" id="projects" style="top: calc(50% - 250px); left: calc(50% - 330px); display: none;">
    <div class="windowheader" id="projectsheader">
      <div class="closebutton" id="projectsclose"></div>
      <p class="headertext">Projects</p>
      <div class="spacer"></div>
    </div>
    <div class="projectsbody">
      <div class="projects-list">
        <div class="filters" id="projectFilters"></div>
        <div id="projectGrid"></div>
      </div>
      <div class="projects-detail" id="projectDetail"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
